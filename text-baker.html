<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Baker - AI Language Polishing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        h1 {
            font-size: 1.8em;
            color: #fff;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 0.9em;
        }

        .settings-top {
            margin-bottom: 15px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .text-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 968px) {
            .text-layout {
                grid-template-columns: 1fr;
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: #242424;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .panel h2 {
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #fff;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .settings-group {
            margin-bottom: 12px;
        }

        .settings-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9em;
            font-weight: 500;
        }

        .settings-group select,
        .settings-group input[type="text"],
        .settings-group input[type="password"] {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 1em;
        }

        .settings-group input[type="range"] {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        .settings-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #4a9eff;
            cursor: pointer;
            border-radius: 50%;
        }

        .settings-group input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #4a9eff;
            cursor: pointer;
            border-radius: 50%;
            border: none;
        }

        .slider-value {
            display: block;
            margin-top: 5px;
            color: #4a9eff;
            font-weight: 600;
            font-size: 0.9em;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
        }

        .output-area {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 1em;
            line-height: 1.8;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output-area:empty::before {
            content: 'Polished text will appear here...';
            color: #555;
        }

        button {
            background: #4a9eff;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background: #3a8eef;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        button.secondary {
            background: #555;
        }

        button.secondary:hover {
            background: #666;
        }

        button.danger {
            background: #d32f2f;
        }

        button.danger:hover {
            background: #c62828;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .loading {
            display: none;
            color: #4a9eff;
            margin-top: 10px;
            font-style: italic;
        }

        .loading.active {
            display: block;
        }

        .error {
            color: #ff5252;
            margin-top: 10px;
            padding: 10px;
            background: #2a1a1a;
            border-radius: 5px;
            border-left: 3px solid #ff5252;
        }


        .history-item {
            background: #1a1a1a;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            border-left: 3px solid #4a9eff;
        }

        .history-item:hover {
            background: #2a2a2a;
        }

        .history-timestamp {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .history-preview {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-meta {
            color: #666;
            font-size: 0.8em;
        }

        .revision-mark b {
            color: #66bb6a;
            font-weight: 600;
        }

        .revision-mark s {
            color: #ef5350;
            text-decoration: line-through;
        }

        .revision-mark b i,
        .revision-mark i b {
            color: #ffa726;
        }

        .collapsible-section {
            margin-bottom: 15px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px 10px;
            background: #1a1a1a;
            border-radius: 5px;
            margin-bottom: 8px;
        }

        .section-header:hover {
            background: #2a2a2a;
        }

        .section-content {
            display: none;
        }

        .section-content.active {
            display: block;
        }

        .toggle-icon {
            font-weight: bold;
            user-select: none;
        }

        .workspace-section {
            margin-bottom: 20px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title h3 {
            color: #fff;
            font-size: 1.2em;
            margin: 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #242424;
            padding: 30px;
            border-radius: 8px;
            max-width: 400px;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #fff;
        }

        .modal-content p {
            margin-bottom: 20px;
            color: #aaa;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #api-status {
            display: inline-block;
            font-size: 0.9em;
            vertical-align: middle;
        }

        .legend {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 12px 20px;
            background: #242424;
            border-radius: 8px;
            font-size: 0.85em;
            color: #888;
        }

        .legend-title {
            color: #aaa;
            font-weight: 600;
        }

        .legend-sep {
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍞 Text Baker</h1>
            <p class="subtitle">AI-Powered Language Polishing</p>
        </header>

        <!-- Settings at Top -->
        <div class="settings-top panel">
            <h2>Settings</h2>

            <!-- API Provider Configuration (Collapsible) -->
            <div class="collapsible-section">
                <div class="section-header" onclick="toggleSection('provider-config')">
                    <span><strong>API Provider Configuration</strong></span>
                    <span class="toggle-icon" id="provider-config-icon">▶</span>
                </div>
                <div class="section-content" id="provider-config">
                    <div class="settings-grid">
                        <div class="settings-group">
                            <label>Provider</label>
                            <select id="provider">
                                <option value="openai">OpenAI</option>
                                <option value="gemini">Google Gemini</option>
                                <option value="local">Local / Ollama</option>
                            </select>
                        </div>

                        <div class="settings-group" id="api-key-group">
                            <label>API Key</label>
                            <input type="password" id="api-key" placeholder="Enter your API key">
                        </div>

                        <div class="settings-group">
                            <label>Model</label>
                            <input type="text" id="model" placeholder="e.g., gpt-4o">
                        </div>

                        <div class="settings-group">
                            <label>Base URL</label>
                            <input type="text" id="base-url" placeholder="API endpoint URL">
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <button class="secondary" onclick="verifyAPI()">Verify API Connection</button>
                        <span id="api-status" style="margin-left: 10px;"></span>
                    </div>
                </div>
            </div>

            <!-- Language & Style Settings -->
            <div class="settings-grid" style="margin-top: 20px;">
                <div class="settings-group">
                    <label>Language</label>
                    <select id="language">
                        <option value="English">English</option>
                        <option value="Chinese">Chinese</option>
                        <option value="French">French</option>
                        <option value="Spanish">Spanish</option>
                        <option value="German">German</option>
                        <option value="Japanese">Japanese</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label>Purpose / Register</label>
                    <input type="range" id="register" min="0" max="4" value="2" step="1">
                    <span class="slider-value" id="register-value">Neutral</span>
                </div>

                <div class="settings-group">
                    <label>Polish Intensity</label>
                    <input type="range" id="intensity" min="0" max="4" value="2" step="1">
                    <span class="slider-value" id="intensity-value">Moderate</span>
                </div>
            </div>
        </div>

        <!-- Side-by-Side Text Areas -->
        <div class="text-layout">
            <!-- Original Text (Left) -->
            <div class="panel">
                <div class="section-title">
                    <h3>Original Text</h3>
                </div>
                <textarea id="input-text" placeholder="Paste or type your text here..."></textarea>
                <div class="button-group">
                    <button id="polish-btn">Polish Text</button>
                    <button class="secondary" onclick="clearAll()">Clear All</button>
                </div>
                <div class="loading" id="loading">Processing...</div>
                <div id="error-message"></div>
            </div>

            <!-- Polished Output (Right) -->
            <div class="panel">
                <div class="section-title">
                    <h3>Polished Output</h3>
                    <button class="secondary" id="copy-btn" onclick="copyCleanText(this)">Copy Clean Text</button>
                </div>
                <div class="output-area revision-mark" id="output"></div>
            </div>
        </div>

        <!-- History Button -->
        <div style="text-align: center; margin-top: 20px;">
            <button class="secondary" onclick="openHistoryModal()">View History</button>
        </div>

        <!-- Legend -->
        <div class="legend">
            <span class="legend-title">Revision Marks:</span>
            <span class="legend-item"><b style="color: #66bb6a;">Bold green</b> = Added text</span>
            <span class="legend-sep">|</span>
            <span class="legend-item"><s style="color: #ef5350;">Strikethrough red</s> = Deleted text</span>
            <span class="legend-sep">|</span>
            <span class="legend-item"><b style="color: #ffa726;"><i>Bold italic orange</i></b> = Fully rephrased</span>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <h3>Confirm Action</h3>
            <p id="confirm-message"></p>
            <div class="modal-buttons">
                <button class="danger" onclick="confirmAction()">Confirm</button>
                <button class="secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div class="modal" id="history-modal">
        <div class="modal-content" style="max-width: 800px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0;">History</h3>
                <button class="secondary" onclick="closeHistoryModal()" style="padding: 8px 16px;">Close</button>
            </div>
            <div style="margin-bottom: 15px;">
                <button class="danger" onclick="confirmClearHistory()">Clear All History</button>
            </div>
            <div id="history-list" style="overflow-y: auto; flex: 1;"></div>
        </div>
    </div>

    <script>
        // Configuration and State
        const registerLabels = ['Formal', 'Semi-formal', 'Neutral', 'Semi-casual', 'Casual'];
        const intensityLabels = ['Grammar only', 'Light touch', 'Moderate', 'Heavy rewrite', 'Full rephrase'];

        let currentProvider = 'openai';
        let isProcessing = false;
        let confirmCallback = null;

        // Model suggestions per provider
        const modelSuggestions = {
            openai: 'gpt-4o',
            gemini: 'gemini-2.5-flash',
            local: 'llama3'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initializeEventListeners();
            updateModelPlaceholder();
            updateProviderUI();
        });

        function initializeEventListeners() {
            // Provider change
            document.getElementById('provider').addEventListener('change', (e) => {
                currentProvider = e.target.value;
                updateProviderUI();
                updateModelPlaceholder();
            });

            // Slider updates
            document.getElementById('register').addEventListener('input', (e) => {
                document.getElementById('register-value').textContent = registerLabels[e.target.value];
            });

            document.getElementById('intensity').addEventListener('input', (e) => {
                document.getElementById('intensity-value').textContent = intensityLabels[e.target.value];
            });

            // Polish button
            document.getElementById('polish-btn').addEventListener('click', polishText);

            // Enter key in textarea
            document.getElementById('input-text').addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    polishText();
                }
            });

            // Close modals when clicking outside
            document.getElementById('confirm-modal').addEventListener('click', (e) => {
                if (e.target.id === 'confirm-modal') {
                    closeModal();
                }
            });

            document.getElementById('history-modal').addEventListener('click', (e) => {
                if (e.target.id === 'history-modal') {
                    closeHistoryModal();
                }
            });
        }

        function updateProviderUI() {
            const apiKeyGroup = document.getElementById('api-key-group');
            const baseUrlInput = document.getElementById('base-url');

            if (currentProvider === 'local') {
                apiKeyGroup.style.display = 'none';
                baseUrlInput.value = 'http://localhost:11434';
                baseUrlInput.placeholder = 'http://localhost:11434';
            } else {
                apiKeyGroup.style.display = 'block';

                switch(currentProvider) {
                    case 'openai':
                        baseUrlInput.value = 'https://api.openai.com/v1';
                        baseUrlInput.placeholder = 'https://api.openai.com/v1';
                        break;
                    case 'gemini':
                        baseUrlInput.value = 'https://generativelanguage.googleapis.com/v1beta';
                        baseUrlInput.placeholder = 'https://generativelanguage.googleapis.com/v1beta';
                        break;
                }
            }
        }

        function updateModelPlaceholder() {
            const modelInput = document.getElementById('model');
            modelInput.placeholder = `e.g., ${modelSuggestions[currentProvider]}`;
            // Only set default model when field is empty or contains a previous default
            const allDefaults = Object.values(modelSuggestions);
            if (!modelInput.value || allDefaults.includes(modelInput.value)) {
                modelInput.value = modelSuggestions[currentProvider];
            }
        }

        function toggleSection(sectionId) {
            const content = document.getElementById(sectionId);
            const icon = document.getElementById(`${sectionId}-icon`);
            const isActive = content.classList.toggle('active');
            icon.textContent = isActive ? '▼' : '▶';
        }

        function openHistoryModal() {
            loadHistory();
            document.getElementById('history-modal').classList.add('active');
        }

        function closeHistoryModal() {
            document.getElementById('history-modal').classList.remove('active');
        }

        async function verifyAPI() {
            const statusSpan = document.getElementById('api-status');
            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model').value.trim();
            const baseUrl = document.getElementById('base-url').value.trim();

            if (provider !== 'local' && !apiKey) {
                statusSpan.innerHTML = '<span style="color: #ff5252;">❌ API key required</span>';
                return;
            }

            if (!model) {
                statusSpan.innerHTML = '<span style="color: #ff5252;">❌ Model name required</span>';
                return;
            }

            statusSpan.innerHTML = '<span style="color: #4a9eff;">⏳ Verifying...</span>';

            try {
                console.log('Verifying API connection...');
                let result = '';

                if (provider === 'gemini') {
                    const base = (baseUrl || 'https://generativelanguage.googleapis.com/v1beta').replace(/\/+$/, '');
                    const url = `${base}/models/${model}:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: 'Hi' }] }] })
                    });
                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    const data = await response.json();
                    result = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                } else {
                    // OpenAI / Local — both use chat completions
                    let targetUrl;
                    if (provider === 'local') {
                        targetUrl = (baseUrl || 'http://localhost:11434').replace(/\/+$/, '') + '/v1/chat/completions';
                    } else {
                        targetUrl = (baseUrl || 'https://api.openai.com/v1').replace(/\/+$/, '') + '/chat/completions';
                    }
                    const headers = { 'Content-Type': 'application/json' };
                    if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;
                    const response = await fetch(targetUrl, {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            model: model,
                            messages: [{ role: 'user', content: 'Hi' }],
                            max_tokens: 5
                        })
                    });
                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    const data = await response.json();
                    result = data.choices?.[0]?.message?.content || '';
                }

                console.log('Verification result:', result);

                if (result) {
                    statusSpan.innerHTML = '<span style="color: #66bb6a;">✓ Connection successful!</span>';
                    setTimeout(() => { statusSpan.innerHTML = ''; }, 3000);
                } else {
                    statusSpan.innerHTML = '<span style="color: #ff9800;">⚠ Connected but empty response</span>';
                }

            } catch (error) {
                console.error('Verification error:', error);
                statusSpan.innerHTML = `<span style="color: #ff5252;">❌ ${error.message}</span>`;
            }
        }

        function clearInput() {
            document.getElementById('input-text').value = '';
        }

        function clearAll() {
            document.getElementById('input-text').value = '';
            document.getElementById('output').innerHTML = '';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            setTimeout(() => {
                errorDiv.className = '';
                errorDiv.textContent = '';
            }, 5000);
        }

        function setLoading(loading) {
            isProcessing = loading;
            document.getElementById('loading').classList.toggle('active', loading);
            document.getElementById('polish-btn').disabled = loading;
        }

        // API Provider Abstraction Layer
        class APIProvider {
            constructor(config) {
                this.config = config;
            }

            async polish(text, settings) {
                throw new Error('Not implemented');
            }

            buildPrompt(text, settings) {
                const { language, register, intensity } = settings;

                return `Polish this text in ${language}. Style: ${registerLabels[register]}. Intensity: ${intensityLabels[intensity]}.

Show changes using markdown:
- New/added words: **word**
- Deleted words: ~~word~~
- Completely rephrased sentences: ***entire sentence***

Output the polished text with markdown markup showing all changes.

Text:
${text}

Polished version:`;
            }
        }

        class OpenAIProvider extends APIProvider {
            async polish(text, settings, onChunk) {
                const apiKey = this.config.apiKey;
                const model = this.config.model;
                const base = (this.config.baseUrl || 'https://api.openai.com/v1').replace(/\/+$/, '');
                const targetUrl = base + '/chat/completions';
                const prompt = this.buildPrompt(text, settings);

                const messages = [
                    { role: 'system', content: 'You are a professional language editor. Output in markdown format as instructed.' },
                    { role: 'user', content: prompt }
                ];

                const headers = { 'Content-Type': 'application/json' };
                if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

                console.log('OpenAI request to:', targetUrl);
                console.log('Model:', model);

                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        model: model,
                        messages: messages,
                        temperature: 0.3
                    })
                });

                console.log('Response status:', response.status, response.statusText);

                if (!response.ok) {
                    const error = await response.text();
                    console.error('OpenAI error response:', error);
                    throw new Error(`API Error: ${response.status} - ${error}`);
                }

                const data = await response.json();
                console.log('Response data:', data);

                const result = data.choices?.[0]?.message?.content || '';

                if (result) {
                    onChunk(result);
                }

                return result;
            }
        }

        class GeminiProvider extends APIProvider {
            async polish(text, settings, onChunk) {
                const apiKey = this.config.apiKey;
                const model = this.config.model;
                const baseUrl = this.config.baseUrl || 'https://generativelanguage.googleapis.com/v1beta';
                const prompt = this.buildPrompt(text, settings);

                const url = `${baseUrl}/models/${model}:generateContent?key=${apiKey}`;

                console.log('Gemini request to:', url);

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    const error = await response.text();
                    console.error('Gemini error response:', error);
                    throw new Error(`Gemini API Error: ${response.status} - ${error}`);
                }

                const data = await response.json();
                console.log('Response data:', data);

                const result = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

                if (result) {
                    onChunk(result);
                }

                return result;
            }
        }

        class LocalProvider extends APIProvider {
            async polish(text, settings, onChunk) {
                const base = (this.config.baseUrl || 'http://localhost:11434').replace(/\/+$/, '');
                const targetUrl = base + '/v1/chat/completions';
                const model = this.config.model;
                const prompt = this.buildPrompt(text, settings);

                const messages = [
                    { role: 'system', content: 'You are a professional language editor. Output in markdown format as instructed.' },
                    { role: 'user', content: prompt }
                ];

                const headers = { 'Content-Type': 'application/json' };
                if (this.config.apiKey) headers['Authorization'] = `Bearer ${this.config.apiKey}`;

                console.log('Local request to:', targetUrl);

                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        model: model,
                        messages: messages,
                        temperature: 0.3
                    })
                });

                if (!response.ok) {
                    const error = await response.text();
                    console.error('Local API error response:', error);
                    throw new Error(`Local API Error: ${response.status} - ${error}`);
                }

                const data = await response.json();
                console.log('Response data:', data);

                const result = data.choices?.[0]?.message?.content || '';

                if (result) {
                    onChunk(result);
                }

                return result;
            }
        }

        function createProvider() {
            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model').value.trim();
            const baseUrl = document.getElementById('base-url').value.trim();

            const config = {
                apiKey,
                model,
                baseUrl
            };

            console.log('Creating provider:', provider, 'Model:', model, 'BaseURL:', baseUrl);

            switch (provider) {
                case 'openai':
                    return new OpenAIProvider(config);
                case 'gemini':
                    return new GeminiProvider(config);
                case 'local':
                    return new LocalProvider(config);
                default:
                    throw new Error('Unknown provider');
            }
        }

        async function polishText() {
            if (isProcessing) return;

            const inputText = document.getElementById('input-text').value.trim();
            if (!inputText) {
                showError('Please enter some text to polish');
                return;
            }

            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model').value.trim();

            if (provider !== 'local' && !apiKey) {
                showError('Please enter your API key');
                return;
            }

            if (!model) {
                showError('Please enter a model name');
                return;
            }

            const settings = {
                language: document.getElementById('language').value,
                register: parseInt(document.getElementById('register').value),
                intensity: parseInt(document.getElementById('intensity').value)
            };

            setLoading(true);
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '<div style="color: #888; font-style: italic;">Processing... Please wait.</div>';

            try {
                const apiProvider = createProvider();
                console.log('Starting polish with provider:', provider);

                let fullMarkdown = '';

                await apiProvider.polish(inputText, settings, (result) => {
                    console.log('Received result:', result);
                    fullMarkdown = result;
                    // Convert markdown to HTML for display
                    outputDiv.innerHTML = markdownToHtml(fullMarkdown);
                });

                console.log('Polish complete.');
                console.log('Full markdown response:', fullMarkdown);

                // If no content received, show message
                if (!fullMarkdown || !fullMarkdown.trim()) {
                    console.error('No content received. Response was empty.');
                    outputDiv.innerHTML = '<div style="color: #ff9800;">No response received from the API. Please check your settings and try again.</div>';
                    return;
                }

                // Save to history (store the HTML version)
                const fullHtml = markdownToHtml(fullMarkdown);
                saveToHistory(inputText, fullHtml, settings);

            } catch (error) {
                outputDiv.innerHTML = '';
                showError(error.message);
                console.error('Polish error:', error);
            } finally {
                setLoading(false);
            }
        }

        function copyCleanText(btn) {
            const outputDiv = document.getElementById('output');
            if (!outputDiv.textContent.trim()) {
                showError('No output to copy');
                return;
            }

            // Clone the output, remove strikethrough text, and get clean text
            const clone = outputDiv.cloneNode(true);
            clone.querySelectorAll('s').forEach(s => {
                // Replace the <s> node with a single space to avoid double spaces
                s.replaceWith(' ');
            });
            // Collapse multiple spaces into one
            const cleanText = clone.textContent.replace(/ {2,}/g, ' ');

            // Copy using fallback method (works on file:// protocol)
            const textarea = document.createElement('textarea');
            textarea.value = cleanText;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            // Visual feedback
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = originalText; }, 2000);
        }

        // History Management
        function saveToHistory(original, polished, settings) {
            const history = getHistory();

            // Get clean text
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = polished;
            const strikethroughs = tempDiv.querySelectorAll('s');
            strikethroughs.forEach(s => s.remove());
            const cleanText = tempDiv.textContent;

            const entry = {
                timestamp: new Date().toISOString(),
                original,
                polished,
                cleanText,
                provider: document.getElementById('provider').value,
                model: document.getElementById('model').value,
                settings: {
                    language: settings.language,
                    register: registerLabels[settings.register],
                    intensity: intensityLabels[settings.intensity]
                }
            };

            history.unshift(entry);

            // Keep only last 50 entries
            if (history.length > 50) {
                history.splice(50);
            }

            localStorage.setItem('textBakerHistory', JSON.stringify(history));
            loadHistory();
        }

        function getHistory() {
            try {
                const data = localStorage.getItem('textBakerHistory');
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function loadHistory() {
            const history = getHistory();
            const listDiv = document.getElementById('history-list');

            if (history.length === 0) {
                listDiv.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">No history yet</p>';
                return;
            }

            listDiv.innerHTML = history.map((entry, index) => {
                const date = new Date(entry.timestamp);
                const preview = entry.original.substring(0, 80) + (entry.original.length > 80 ? '...' : '');

                return `
                    <div class="history-item" onclick="loadHistoryEntry(${index})">
                        <div class="history-timestamp">${date.toLocaleString()}</div>
                        <div class="history-preview">${escapeHtml(preview)}</div>
                        <div class="history-meta">
                            ${entry.provider} / ${entry.model} |
                            ${entry.settings.language} |
                            ${entry.settings.register} |
                            ${entry.settings.intensity}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function loadHistoryEntry(index) {
            const history = getHistory();
            const entry = history[index];

            // Don't clear current input - just update output
            document.getElementById('output').innerHTML = entry.polished;

            // Close the modal
            closeHistoryModal();

            // Scroll to output
            document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function confirmClearHistory() {
            showConfirmModal('Are you sure you want to clear all history? This action cannot be undone.', () => {
                localStorage.removeItem('textBakerHistory');
                loadHistory(); // Reload the history in the modal
            });
        }

        function showConfirmModal(message, callback) {
            document.getElementById('confirm-message').textContent = message;
            document.getElementById('confirm-modal').classList.add('active');
            confirmCallback = callback;
        }

        function closeModal() {
            document.getElementById('confirm-modal').classList.remove('active');
            confirmCallback = null;
        }

        function confirmAction() {
            if (confirmCallback) {
                confirmCallback();
            }
            closeModal();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function markdownToHtml(markdown) {
            let html = markdown;

            // Convert ***text*** (bold italic) - must be before ** conversion
            html = html.replace(/\*\*\*([^*]+)\*\*\*/g, '<b><i>$1</i></b>');

            // Convert **text** (bold - additions)
            html = html.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');

            // Convert ~~text~~ (strikethrough - deletions)
            html = html.replace(/~~([^~]+)~~/g, '<s>$1</s>');

            // Preserve line breaks
            html = html.replace(/\n/g, '<br>');

            return html;
        }
    </script>
</body>
